routing-policy
  flowspec-local-policies
    ipv4
      match-class MC4-S3e-01
        dest-ip 10.3.0.1/32
        src-ip 192.168.0.1/32
      !
      match-class MC4-S3e-02
        dest-ip 10.3.0.2/32
        src-ip 192.168.0.2/32
      !
      match-class MC4-S3e-03
        dest-ip 10.3.0.3/32
        src-ip 192.168.0.3/32
      !
      match-class MC4-S3e-04
        dest-ip 10.3.0.4/32
        src-ip 192.168.0.4/32
      !
      match-class MC4-S3e-05
        dest-ip 10.3.0.5/32
        src-ip 192.168.0.5/32
      !
      match-class MC4-S3e-06
        dest-ip 10.3.0.6/32
        src-ip 192.168.0.6/32
      !
      match-class MC4-S3e-07
        dest-ip 10.3.0.7/32
        src-ip 192.168.0.7/32
      !
      match-class MC4-S3e-08
        dest-ip 10.3.0.8/32
        src-ip 192.168.0.8/32
      !
      match-class MC4-S3e-09
        dest-ip 10.3.0.9/32
        src-ip 192.168.0.9/32
      !
      match-class MC4-S3e-10
        dest-ip 10.3.0.10/32
        src-ip 192.168.0.10/32
      !
      policy POL4-S3E
        description dest-ip + src-ip
        match-class MC4-S3e-01
          action rate-limit 0
        !
        match-class MC4-S3e-02
          action rate-limit 0
        !
        match-class MC4-S3e-03
          action rate-limit 0
        !
        match-class MC4-S3e-04
          action rate-limit 0
        !
        match-class MC4-S3e-05
          action rate-limit 0
        !
        match-class MC4-S3e-06
          action rate-limit 0
        !
        match-class MC4-S3e-07
          action rate-limit 0
        !
        match-class MC4-S3e-08
          action rate-limit 0
        !
        match-class MC4-S3e-09
          action rate-limit 0
        !
        match-class MC4-S3e-10
          action rate-limit 0
        !
      !
    !
  !
!
forwarding-options
  flowspec-local
    ipv4
      apply-policy-to-flowspec POL4-S3E
    !
  !
!
